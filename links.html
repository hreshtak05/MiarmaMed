  <style>
    :root{
      --gold-1:#E9D08A; --gold-2:#C9A24B; --gold-3:#B8860B;
      --gold-grad:linear-gradient(135deg,#E9D08A 0%,#C9A24B 45%,#B8860B 100%);
      --pink-1:#FCEFF3; --pink-2:#F6D9E2; --blush:#F8E1E7;
      --cream:#FFFBF6; --ink:#3A2E2A; --muted:#8a7d77; --line:#efe3e7;
    }
    *{box-sizing:border-box;margin:0;padding:0}
    body{
      font-family:"Noto Sans Armenian","Segoe UI",system-ui,sans-serif;
      color:var(--ink);min-height:100vh;line-height:1.5;
      background:
        radial-gradient(700px 500px at 50% -10%, var(--blush) 0%, transparent 60%),
        radial-gradient(600px 400px at 100% 100%, #fdf3e4 0%, transparent 55%),
        var(--cream);
      display:flex;justify-content:center;padding:2.5rem 1.2rem 3rem;
    }
    .wrap{width:100%;max-width:480px;text-align:center}

    .logo{width:120px;height:120px;margin:0 auto 1rem;border-radius:50%;
      background:#fff;display:grid;place-items:center;
      box-shadow:0 12px 30px rgba(184,134,11,.18);border:1px solid var(--line)}
    .logo img{width:80%}
    h1{font-family:"Cormorant Garamond",serif;font-size:2rem;letter-spacing:.06em;
      background:var(--gold-grad);-webkit-background-clip:text;background-clip:text;color:transparent}
    .tagline{color:var(--muted);font-size:.92rem;letter-spacing:.22em;
      text-transform:uppercase;margin-bottom:1.8rem}

    .links{display:flex;flex-direction:column;gap:.9rem}
    .link{
      display:flex;align-items:center;gap:1rem;
      background:#fff;border:1px solid var(--line);border-radius:16px;
      padding:1rem 1.2rem;font-size:1.02rem;font-weight:600;color:var(--ink);
      text-decoration:none;box-shadow:0 6px 18px rgba(170,120,90,.07);
      transition:transform .2s ease,box-shadow .2s ease,border-color .2s ease;
    }
    .link:hover{transform:translateY(-3px);border-color:var(--gold-2);
      box-shadow:0 14px 30px rgba(184,134,11,.16)}
    .link .ico{width:40px;height:40px;flex:0 0 40px;border-radius:12px;
      display:grid;place-items:center;background:var(--blush);color:var(--gold-3)}
    .link .ico svg{width:20px;height:20px}
    .link span{flex:1;text-align:left}
    .link .arrow{color:var(--muted);font-size:1.1rem}
    /* featured (primary) button */
    .link.primary{background:var(--gold-grad);color:#fff;border-color:transparent}
    .link.primary .ico{background:rgba(255,255,255,.25);color:#fff}
    .link.primary .arrow{color:rgba(255,255,255,.85)}

    .socials{display:flex;justify-content:center;gap:1rem;margin-top:2rem}
    .socials a{width:48px;height:48px;border-radius:50%;display:grid;place-items:center;
      background:#fff;border:1px solid var(--line);color:var(--gold-3);
      transition:.2s;box-shadow:0 6px 18px rgba(170,120,90,.07)}
    .socials a:hover{background:var(--gold-grad);color:#fff;transform:translateY(-3px)}
    .socials svg{width:22px;height:22px}

    footer{margin-top:2.2rem;color:var(--muted);font-size:.8rem;letter-spacing:.05em}
  </style>
</head>
