<!DOCTYPE html>
<html lang="hy">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>MIARMA·MED — CRM</title>
<link rel="icon" type="image/png" href="assets/emblem.png" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700&family=Noto+Sans+Armenian:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
<style>
  :root{
    --gold-2:#C9A24B; --gold-3:#B8860B;
    --gold-grad:linear-gradient(135deg,#E9D08A 0%,#C9A24B 45%,#B8860B 100%);
    --pink:#FCEFF3; --blush:#F8E1E7; --cream:#FFFBF6;
    --ink:#3A2E2A; --muted:#8a7d77; --line:#efe3e7;
    --new:#2f6fed; --called:#c9820b; --enrolled:#1f9d55; --declined:#b0342c;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:"Noto Sans Armenian","Segoe UI",system-ui,sans-serif;color:var(--ink);
    background:radial-gradient(900px 500px at 100% -10%, var(--blush) 0%, transparent 55%),var(--cream);
    min-height:100vh;line-height:1.45}

  /* ===== login ===== */
  .login{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:1.5rem}
  .login-card{background:#fff;border:1px solid var(--line);border-radius:20px;padding:2.2rem 2rem;
    width:100%;max-width:360px;text-align:center;box-shadow:0 20px 50px rgba(170,120,90,.14)}
  .login-card img{width:64px;height:64px;margin-bottom:.6rem}
  .login-card h1{font-family:"Cormorant Garamond",serif;font-size:1.6rem;
    background:var(--gold-grad);-webkit-background-clip:text;background-clip:text;color:transparent}
  .login-card p{color:var(--muted);font-size:.85rem;margin:.2rem 0 1.3rem}
  .login-card input{width:100%;font-family:inherit;font-size:1rem;padding:.7rem .9rem;
    border:1px solid var(--line);border-radius:10px;margin-bottom:.8rem;text-align:center}
  .login-card button{width:100%;border:0;border-radius:10px;padding:.75rem;cursor:pointer;
    background:var(--gold-grad);color:#fff;font-family:inherit;font-weight:600;font-size:1rem}
  .login-err{color:var(--declined);font-size:.85rem;margin-top:.6rem;min-height:1.1em}

  /* ===== app ===== */
  .app[hidden]{display:none}
  .topbar{display:flex;align-items:center;gap:1rem;padding:1rem 1.6rem;background:#fff;
    border-bottom:1px solid var(--line);position:sticky;top:0;z-index:5;flex-wrap:wrap}
  .topbar .logo{display:flex;align-items:center;gap:.6rem}
  .topbar .logo img{width:40px;height:40px}
  .topbar .logo strong{font-family:"Cormorant Garamond",serif;font-size:1.25rem;letter-spacing:.12em;
    background:var(--gold-grad);-webkit-background-clip:text;background-clip:text;color:transparent}
  .topbar .logo small{display:block;font-size:.6rem;letter-spacing:.28em;color:var(--muted)}
  .topbar .title{font-weight:600;color:var(--muted);letter-spacing:.14em;font-size:.8rem;text-transform:uppercase}
  .topbar .right{margin-left:auto;display:flex;gap:.6rem;align-items:center}
  .btn{border:1px solid var(--line);background:#fff;color:var(--ink);border-radius:10px;
    padding:.5rem .9rem;font-family:inherit;font-size:.85rem;font-weight:600;cursor:pointer;transition:.2s}
  .btn:hover{border-color:var(--gold-2);color:var(--gold-3)}
  .btn.primary{background:var(--gold-grad);color:#fff;border-color:transparent}
  .btn.danger{color:var(--declined);border-color:#e7c4c0}
  .btn.danger:hover{background:#fbeceb;border-color:var(--declined);color:var(--declined)}

  .wrap{padding:1.6rem;max-width:1400px;margin:0 auto}
  .stats{display:grid;grid-template-columns:repeat(4,1fr);gap:1rem;margin-bottom:1.4rem}
  .stat{background:#fff;border:1px solid var(--line);border-radius:16px;padding:1.1rem 1.2rem;
    box-shadow:0 6px 18px rgba(170,120,90,.06)}
  .stat .n{font-size:2rem;font-weight:700;font-family:"Cormorant Garamond",serif;line-height:1}
  .stat .l{color:var(--muted);font-size:.82rem;margin-top:.35rem}
  .stat.total .n{color:var(--gold-3)}
  .stat.new .n{color:var(--new)} .stat.called .n{color:var(--called)} .stat.enrolled .n{color:var(--enrolled)}

  .toolbar{display:flex;gap:.7rem;flex-wrap:wrap;margin-bottom:1rem;align-items:center}
  .toolbar input,.toolbar select{font-family:inherit;font-size:.88rem;padding:.55rem .8rem;
    border:1px solid var(--line);border-radius:10px;background:#fff;color:var(--ink)}
  .toolbar input.search{flex:1;min-width:220px}
  .count-note{color:var(--muted);font-size:.85rem;margin-left:auto}

  .table-wrap{overflow-x:auto;background:#fff;border:1px solid var(--line);border-radius:16px;
    box-shadow:0 6px 18px rgba(170,120,90,.06)}
  table{border-collapse:collapse;width:100%;min-width:1100px;font-size:.87rem}
  th,td{text-align:left;padding:.75rem .9rem;border-bottom:1px solid var(--line);vertical-align:top}
  th{background:var(--pink);color:#7a5a62;font-weight:600;font-size:.78rem;position:sticky;top:0;white-space:nowrap}
  tbody tr:hover{background:#fff8fb}
  td.name{font-weight:600;white-space:nowrap}
  a.tel{color:var(--ink);text-decoration:none}a.tel:hover{color:var(--gold-3)}
  .course-tag{display:inline-block;background:var(--blush);color:#8a5a2a;border-radius:8px;
    padding:.15rem .5rem;font-size:.78rem;font-weight:600}
  .yes{color:var(--enrolled);font-weight:600}.no{color:var(--muted)}
  .status{border:0;border-radius:999px;padding:.35rem .7rem;font-family:inherit;font-weight:600;
    font-size:.78rem;cursor:pointer;color:#fff}
  .status.new{background:var(--new)}.status.called{background:var(--called)}
  .status.enrolled{background:var(--enrolled)}.status.declined{background:var(--declined)}
  td.notes input{width:150px;border:1px solid var(--line);border-radius:8px;padding:.4rem .5rem;
    font-family:inherit;font-size:.82rem}
  .empty{padding:3rem;text-align:center;color:var(--muted)}
  .loading{padding:3rem;text-align:center;color:var(--muted)}
  @media (max-width:700px){ .stats{grid-template-columns:1fr 1fr} .wrap{padding:1rem} }
</style>
</head>
<body>

  <!-- ===== LOGIN ===== -->
  <div class="login" id="login">
    <form class="login-card" id="loginForm">
      <img src="assets/emblem.png" alt="" onerror="this.style.display='none'"/>
      <h1>MIARMA·MED</h1>
      <p>CRM · Գրանցումներ</p>
      <input type="password" id="pwd" placeholder="Գաղտնաբառ" autocomplete="current-password" />
      <button type="submit">Մուտք</button>
      <div class="login-err" id="loginErr"></div>
    </form>
  </div>

  <!-- ===== APP ===== -->
  <div class="app" id="app" hidden>
    <div class="topbar">
      <div class="logo">
        <img src="assets/emblem.png" alt="" onerror="this.style.display='none'"/>
        <div><strong>MIARMA·MED</strong><small>CRM</small></div>
      </div>
      <span class="title">Գրանցումներ</span>
      <div class="right">
        <button class="btn" onclick="exportCSV()">⬇ CSV</button>
        <button class="btn primary" onclick="reload()">↻ Թարմացնել</button>
      </div>
    </div>

    <div class="wrap">
      <div class="stats">
        <div class="stat total"><div class="n" id="s-total">0</div><div class="l">Ընդամենը</div></div>
        <div class="stat new"><div class="n" id="s-new">0</div><div class="l">Նոր</div></div>
        <div class="stat called"><div class="n" id="s-called">0</div><div class="l">Զանգահարված</div></div>
        <div class="stat enrolled"><div class="n" id="s-enrolled">0</div><div class="l">Գրանցված</div></div>
      </div>

      <div class="toolbar">
        <input class="search" id="search" placeholder="🔍 Որոնել ըստ անվան կամ հեռախոսի..." oninput="render()" />
        <select id="fCourse" onchange="render()"><option value="">Բոլոր դասընթացները</option></select>
        <select id="fStatus" onchange="render()">
          <option value="">Բոլոր կարգավիճակները</option>
          <option value="Նոր">Նոր</option>
          <option value="Զանգահարված">Զանգահարված</option>
          <option value="Գրանցված">Գրանցված</option>
          <option value="Մերժված">Մերժված</option>
        </select>
        <button class="btn danger" onclick="deleteSelected()">🗑 Ջնջել ընտրվածները</button>
        <span class="count-note" id="countNote"></span>
      </div>

      <div class="table-wrap">
        <table>
          <thead><tr>
            <th style="width:34px;text-align:center"><input type="checkbox" id="selAll" onclick="toggleAll(this)" aria-label="Ընտրել բոլորը" /></th><th>Ամսաթիվ</th><th>Անուն, ազգանուն</th><th>Հեռախոս</th><th>Էլ. հասցե</th>
            <th>Մասնագիտություն</th><th>Աշխատում է</th><th>Հաստատություն</th><th>ՈՒՁ փորձ</th>
            <th>Դասընթաց</th><th>Կարգավիճակ</th><th>Նշումներ</th>
          </tr></thead>
          <tbody id="rows"></tbody>
        </table>
        <div class="loading" id="loading">Բեռնվում է...</div>
        <div class="empty" id="empty" hidden>Գրանցումներ դեռ չկան։</div>
      </div>
    </div>
  </div>

<script>
// ===== CONFIG =====
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzl5oQ2MAIErzK2Clo3YjBnVSJ-pwo11hsfHdUFtKBy-yvgFFAITc1M6_v9Hox1Mq_g/exec";

const STATUSES = ['Նոր','Զանգահարված','Գրանցված','Մերժված'];
const STATUS_CLASS = {'Նոր':'new','Զանգահարված':'called','Գրանցված':'enrolled','Մերժված':'declined'};

let DATA = [];
let PWD = "";

// ---- JSONP read ----
function fetchData(pwd){
  return new Promise((resolve, reject)=>{
    const cb = '__cb' + Date.now();
    const s = document.createElement('script');
    const timer = setTimeout(()=>{ cleanup(); reject(new Error('timeout')); }, 15000);
    function cleanup(){ clearTimeout(timer); delete window[cb]; if(s.parentNode) s.parentNode.removeChild(s); }
    window[cb] = (res)=>{ cleanup(); resolve(res); };
    s.onerror = ()=>{ cleanup(); reject(new Error('network')); };
    s.src = SCRIPT_URL + '?key=' + encodeURIComponent(pwd) + '&callback=' + cb + '&t=' + Date.now();
    document.body.appendChild(s);
  });
}

// ---- login ----
document.getElementById('loginForm').addEventListener('submit', async (e)=>{
  e.preventDefault();
  const pwd = document.getElementById('pwd').value;
  const err = document.getElementById('loginErr');
  err.textContent = 'Ստուգվում է...';
  try{
    const res = await fetchData(pwd);
    if(res && res.ok){
      PWD = pwd;
      document.getElementById('login').style.display = 'none';
      document.getElementById('app').hidden = false;
      DATA = res.rows || [];
      afterLoad();
    } else {
      err.textContent = 'Սխալ գաղտնաբառ։';
    }
  }catch(ex){
    err.textContent = 'Կապի սխալ։ Փորձեք կրկին։';
  }
});

async function reload(){
  document.getElementById('loading').hidden = false;
  document.getElementById('loading').textContent = 'Թարմացվում է...';
  try{
    const res = await fetchData(PWD);
    if(res && res.ok){ DATA = res.rows || []; afterLoad(); }
  }catch(ex){}
}

function afterLoad(){
  document.getElementById('loading').hidden = true;
  const sel = document.getElementById('fCourse');
  sel.length = 1;
  [...new Set(DATA.map(r=>r.course).filter(Boolean))].sort().forEach(c=>{
    const o=document.createElement('option'); o.value=c; o.textContent=c; sel.appendChild(o);
  });
  render();
}

function fmtDate(s){
  const d=new Date(s); if(isNaN(d)) return s||"";
  return d.toLocaleDateString('hy-AM')+' '+d.toLocaleTimeString('hy-AM',{hour:'2-digit',minute:'2-digit'});
}
const esc = s => (s==null?'':s.toString()).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const isYes = v => v===true || v==='Այո' || v==='true';

function render(){
  const q=document.getElementById('search').value.trim().toLowerCase();
  const fc=document.getElementById('fCourse').value;
  const fs=document.getElementById('fStatus').value;

  const norm = r => STATUSES.includes(r.status) ? r.status : 'Նոր';

  const rows = DATA.filter(r=>{
    if(fc && r.course!==fc) return false;
    if(fs && norm(r)!==fs) return false;
    if(q && !((r.full_name||'').toLowerCase().includes(q) || (r.phone||'').toString().toLowerCase().includes(q))) return false;
    return true;
  });

  document.getElementById('s-total').textContent = DATA.length;
  document.getElementById('s-new').textContent = DATA.filter(r=>norm(r)==='Նոր').length;
  document.getElementById('s-called').textContent = DATA.filter(r=>norm(r)==='Զանգահարված').length;
  document.getElementById('s-enrolled').textContent = DATA.filter(r=>norm(r)==='Գրանցված').length;

  const tb=document.getElementById('rows'); tb.innerHTML='';
  document.getElementById('empty').hidden = rows.length>0;
  document.getElementById('countNote').textContent = `Ցուցադրված՝ ${rows.length} / ${DATA.length}`;

  rows.forEach((r)=>{
    const st = norm(r);
    const tr=document.createElement('tr');
    tr.innerHTML=`
      <td style="text-align:center"><input type="checkbox" class="rowchk" value="${r.row}" /></td>
      <td class="sub" style="white-space:nowrap;color:var(--muted)">${fmtDate(r.created_at)}</td>
      <td class="name">${esc(r.full_name)}</td>
      <td><a class="tel" href="tel:${esc(r.phone)}">${esc(r.phone)}</a></td>
      <td>${r.email?`<a class="tel" href="mailto:${esc(r.email)}">${esc(r.email)}</a>`:'<span class="no">—</span>'}</td>
      <td>${esc(r.profession)}</td>
      <td>${isYes(r.is_working)?'<span class="yes">Այո</span>':'<span class="no">Ոչ</span>'}</td>
      <td>${esc(r.workplace)||'<span class="no">—</span>'}</td>
      <td>${esc(r.ultrasound_experience)||'<span class="no">—</span>'}</td>
      <td><span class="course-tag">${esc(r.course)}</span></td>
      <td>
        <select class="status ${STATUS_CLASS[st]}" onchange="setStatus(${r.row}, this.value, this)">
          ${STATUSES.map(k=>`<option value="${k}" ${k===st?'selected':''}>${k}</option>`).join('')}
        </select>
      </td>
      <td class="notes"><input value="${esc(r.notes)}" placeholder="..." onchange="setNote(${r.row}, this.value)" /></td>`;
    tb.appendChild(tr);
  });
}

function save(row, field, value){
  const payload = { action:'update', key:PWD, row:row };
  payload[field] = value;
  fetch(SCRIPT_URL, { method:'POST', mode:'no-cors',
    headers:{'Content-Type':'text/plain;charset=utf-8'}, body:JSON.stringify(payload) });
}
function setStatus(row, val, el){
  el.className = 'status ' + STATUS_CLASS[val];
  const rec = DATA.find(r=>r.row===row); if(rec) rec.status = val;
  save(row, 'status', val);
  render();
}
function setNote(row, val){
  const rec = DATA.find(r=>r.row===row); if(rec) rec.notes = val;
  save(row, 'notes', val);
}

function toggleAll(el){
  document.querySelectorAll('.rowchk').forEach(c=>{ c.checked = el.checked; });
}
function deleteSelected(){
  const chks = [...document.querySelectorAll('.rowchk:checked')];
  if(!chks.length){ alert('Ընտրեք առնվազն մեկ գրանցում՝ ջնջելու համար։'); return; }
  const rows = chks.map(c=>+c.value);
  if(!confirm('Ջնջե՞լ ընտրված ' + rows.length + ' գրանցումը։ Այս գործողությունը հետ չի վերադարձվում։')) return;
  fetch(SCRIPT_URL, { method:'POST', mode:'no-cors',
    headers:{'Content-Type':'text/plain;charset=utf-8'}, body:JSON.stringify({ action:'delete', key:PWD, rows:rows }) });
  DATA = DATA.filter(r=>!rows.includes(r.row));  // instant feedback
  const sa = document.getElementById('selAll'); if(sa) sa.checked = false;
  render();
  setTimeout(reload, 1600);  // refresh row numbers from the server
}

function exportCSV(){
  const cols=['created_at','full_name','phone','email','profession','is_working','workplace','ultrasound_experience','course','status','notes'];
  const head=['Ամսաթիվ','Անուն ազգանուն','Հեռախոս','Էլ.հասցե','Մասնագիտություն','Աշխատում է','Հաստատություն','ՈՒՁ փորձ','Դասընթաց','Կարգավիճակ','Նշումներ'];
  const lines=[head.join(',')];
  DATA.forEach(r=>lines.push(cols.map(c=>`"${(r[c]==null?'':r[c]).toString().replace(/"/g,'""')}"`).join(',')));
  const blob=new Blob(["﻿"+lines.join('\n')],{type:'text/csv;charset=utf-8'});
  const a=document.createElement('a'); a.href=URL.createObjectURL(blob);
  a.download='miarmamed-registrations.csv'; a.click();
}
</script>
</body>
</html>
